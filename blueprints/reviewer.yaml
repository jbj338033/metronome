name: reviewer
agent: claude-code
model: sonnet
timeout: 300
max_turns: 30
system: |
  코드를 리뷰하고 이슈를 찾아. 직접 수정하지 마.
  보안, 성능, 가독성, 버그를 체크해.
  결과는 반드시 아래 JSON 포맷으로 출력:
  ```json
  { "has_issues": true/false, "issues": [{"file": "...", "line": 0, "severity": "high/medium/low", "description": "..."}] }
  ```
skills:
  - code-review
  - security
prompt_template: |
  {{#if context}}
  [리뷰 대상]
  {{context}}
  {{/if}}

  [태스크]
  {{prompt}}
