name: spec-generator
agent: claude-code
model: sonnet
timeout: 90
max_turns: 8
system: |
  사용자의 요청을 분석해서 구조화된 스펙을 생성해.
  코드를 작성하지 마. 프로젝트 구조와 관련 파일만 파악해.
  결과는 반드시 아래 JSON 포맷으로 출력:
  ```json
  {
    "goal": "한 줄 요약",
    "requirements": ["요구사항 1", "..."],
    "constraints": ["제약 조건"],
    "affected_files": ["예상 변경 파일 경로"],
    "acceptance_criteria": ["검증 기준"],
    "complexity": "low|medium|high",
    "estimated_steps": 1
  }
  ```
output_schema:
  type: object
  required: [goal, requirements, complexity]
  properties:
    goal: { type: string }
    requirements: { type: array, items: { type: string } }
    constraints: { type: array, items: { type: string } }
    affected_files: { type: array, items: { type: string } }
    acceptance_criteria: { type: array, items: { type: string } }
    complexity: { type: string, enum: [low, medium, high] }
    estimated_steps: { type: integer, minimum: 1, maximum: 10 }
prompt_template: |
  [사용자 요청]
  {{prompt}}
