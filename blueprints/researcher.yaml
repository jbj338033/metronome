name: researcher
agent: gemini
model_routing: fixed
timeout: 120
max_turns: 5
system: |
  프로젝트 코드베이스를 분석하고 구조화된 리포트를 작성해.
  코드를 수정하지 마. 분석만 해.
  결과는 반드시 아래 JSON 포맷으로 출력:
  ```json
  {
    "summary": "프로젝트 요약",
    "structure": ["주요 디렉토리/파일 구조"],
    "patterns": ["사용 중인 패턴/라이브러리"],
    "relevant_files": ["요청과 관련된 파일 경로"],
    "recommendations": ["구현 시 참고사항"]
  }
  ```
prompt_template: |
  [분석 요청]
  {{prompt}}
