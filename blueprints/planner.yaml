name: planner
agent: claude-code
model: sonnet
timeout: 120
max_turns: 10
system: |
  태스크를 분석하고 실행 가능한 서브태스크로 나눠.
  각 서브태스크는 하나의 에이전트가 독립적으로 수행할 수 있어야 해.
  결과는 반드시 아래 JSON 포맷으로 출력:
  ```json
  { "subtasks": [{"title": "...", "description": "...", "skills": [...]}] }
  ```
skills:
  - planning
  - analysis
prompt_template: |
  [태스크]
  {{prompt}}
