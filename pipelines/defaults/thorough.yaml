name: thorough
timeout: 3600

steps:
  - id: plan
    blueprint: planner
    timeout: 120

  - id: implement
    blueprint: coder
    depends_on: [plan]
    fan_out: "plan.subtasks"
    max_concurrency: 3
    timeout: 600
    retry: { max: 1, backoff: exponential }
    verify:
      blueprint: verifier
      max_fix_attempts: 2
      pass_condition: "implement__verify.passed"
      include_in_fix: [issues, artifacts]

  - id: review
    blueprint: reviewer
    depends_on: [implement]
    context:
      - step: implement
        include: [artifacts, structured]
    timeout: 300
    approval: true
