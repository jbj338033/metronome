name: thorough
max_replan: 3
timeout: 3600

steps:
  - id: plan
    blueprint: planner
    timeout: 120

  - id: implement
    blueprint: coder
    depends_on: [plan]
    fan_out: "plan.subtasks"
    merge: all
    max_concurrency: 3
    merge_strategy: sequential
    on_conflict: agent
    timeout: 600
    retry: { max: 2, backoff: exponential }

  - id: review
    blueprint: reviewer
    depends_on: [implement]
    context:
      - step: implement
        include: [artifacts]
    timeout: 300

  - id: fix
    blueprint: coder
    depends_on: [review]
    condition: "review.has_issues"
    on_skip: complete
    timeout: 600

  - id: verify
    blueprint: verifier
    depends_on: [fix]
    approval: true
    timeout: 300
