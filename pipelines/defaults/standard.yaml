name: standard
max_replan: 2
timeout: 1800

steps:
  - id: plan
    blueprint: planner
    timeout: 120

  - id: implement
    blueprint: coder
    depends_on: [plan]
    fan_out: "plan.subtasks"
    merge: all
    max_concurrency: 3
    merge_strategy: sequential
    on_conflict: agent
    timeout: 600
    retry: { max: 2 }

  - id: verify
    blueprint: verifier
    depends_on: [implement]
    context:
      - step: implement
        include: [artifacts]
    timeout: 300
